name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  UV_FROZEN: "1"

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Clean previous build outputs
        run: rm -rf dist build *.egg-info

      - name: Build distributions
        run: uv build

      - name: Smoke test wheel
        run: |
          python -m venv /tmp/injex-release-smoke
          /tmp/injex-release-smoke/bin/python -m pip install dist/*.whl
          /tmp/injex-release-smoke/bin/python - <<'PY'
          from injex import Container

          class Service:
              pass

          container = Container()
          container.add_singleton(Service)
          assert isinstance(container.resolve(Service), Service)
          assert container.validate() == []
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: injex-dist
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true

      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
