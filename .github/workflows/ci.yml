name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run linters
        run: uv run ruff check .

      - name: Run format checks
        run: uv run ruff format --check .

      - name: Spell check
        run: uv run --with codespell codespell .

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install fastapi httpx "typing-extensions>=4.13"

      - name: Run type checks
        run: uv run --no-sync mypy injex tests

  test:
    name: Tests (${{ matrix.os }} / ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # Cross-OS smoke on the oldest and newest supported Pythons —
          # threading, asyncio, the exec-compiled creators, and file-backed
          # resources all need to behave the same off Linux.
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov=injex --cov-report=xml

      - name: Upload coverage file
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml

  fastapi:
    name: FastAPI integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install fastapi httpx "typing-extensions>=4.13"

      - name: Run FastAPI integration tests
        run: uv run --no-sync pytest tests/test_ext_fastapi.py --no-cov

  links:
    name: Link Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check relative links
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline checks local files only (no flaky network). 404.html uses
          # root-relative /injex/ links that only resolve on the deployed Pages
          # site, which lychee can't build offline — skip just that file.
          args: "--offline --no-progress --exclude-path site/404.html README.md CHANGELOG.md CONTRIBUTING.md ROADMAP.md docs site"
          fail: true

  coverage:
    name: Upload Coverage to Codecov
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download coverage files
        uses: actions/download-artifact@v8
        with:
          name: coverage-ubuntu-latest-3.10

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  package:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build distributions
        run: uv build

      - name: Smoke test wheel
        run: |
          python -m venv /tmp/injex-smoke
          /tmp/injex-smoke/bin/python -m pip install dist/*.whl
          /tmp/injex-smoke/bin/python - <<'PY'
          from injex import Container

          class Service:
              pass

          container = Container()
          container.add_singleton(Service)
          assert isinstance(container.resolve(Service), Service)
          assert container.validate() == []
          PY

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, package]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
