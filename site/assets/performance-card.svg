<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Injex 1.3.0 performance card</title>
  <desc id="desc">Injex 1.3.0: typed dependency injection, zero dependencies, 0.818 microseconds per resolve.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#080b10"/>
      <stop offset="55%" stop-color="#0d121a"/>
      <stop offset="100%" stop-color="#070a11"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#8bd3dd" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#75d6b3" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080b10" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="72" y="72" width="1056" height="486" rx="34" fill="#111827" fill-opacity="0.74" stroke="#cbd5e1" stroke-opacity="0.16"/>
  <text x="116" y="150" fill="#8bd3dd" font-family="Inter, ui-sans-serif, system-ui" font-size="28" font-weight="800" letter-spacing="5">INJEX 1.3.0</text>
  <text x="116" y="250" fill="#f6f8fb" font-family="Inter, ui-sans-serif, system-ui" font-size="74" font-weight="850">Typed DI · zero deps</text>
  <text x="116" y="330" fill="#aeb8c7" font-family="Inter, ui-sans-serif, system-ui" font-size="34">Explicit wiring, graph validation, fast resolves.</text>
  <text x="116" y="452" fill="#75d6b3" font-family="Inter, ui-sans-serif, system-ui" font-size="88" font-weight="850">0.818 µs/op</text>
  <text x="116" y="506" fill="#aeb8c7" font-family="Inter, ui-sans-serif, system-ui" font-size="28">median resolve benchmark · smaller is better</text>
</svg>
